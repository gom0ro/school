{% extends 'base.html' %}

{% block title %}{{ page.title }} — Talant №1{% endblock %}

{% block content %}

<section class="page-header page-header-sm">
  <div class="container">
    <nav aria-label="breadcrumb" data-aos="fade-down">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'app:index' %}">Басты бет</a></li>
        <li class="breadcrumb-item active">{{ page.title }}</li>
      </ol>
    </nav>
    <h1 class="page-header-title" data-aos="fade-up">{{ page.title }}</h1>
  </div>
</section>

<section class="section-padding">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8" data-aos="fade-up">
        {% if page.image %}
        <img src="{{ page.image.url }}" alt="{{ page.title }}" class="img-fluid rounded mb-4">
        {% endif %}
        <div class="page-content">
          {{ page.content|linebreaks }}
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
